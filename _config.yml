# Site
title: The Belens
tagline: John Belen — Cape Coral, Florida
description: >-
  Thoughts from the field. 25+ years of dealerships, technology, teaching,
  and the occasional hard-won lesson. Written honestly, by someone who's actually been there.
url: https://thebelens.com
baseurl: ""
lang: en_US

author:
  name: John Belen

social:
  name: John Belen
  links:
    - https://www.linkedin.com/in/johnbelen

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:slug/
timezone: America/New_York

# Plugins (all GitHub Pages whitelisted)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Front-matter defaults — every post automatically gets layout: post
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - CLAUDE.md
  - .claude
